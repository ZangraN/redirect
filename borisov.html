<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTIKAVTO Борисов — Перенаправление на звонок...</title>
    <!-- Подключаем современные шрифты Outfit и Montserrat для авто-тематики -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color-1: #0a0a0c;
            --bg-color-2: #141416;
            --bg-color-3: #050506;
            --accent-red: #e30613; /* Фирменный красный цвет автохауса */
            --accent-red-hover: #ff1f2d;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --card-bg: rgba(25, 25, 28, 0.6);
            --card-border: rgba(227, 6, 19, 0.15);
            --glow-color: rgba(227, 6, 19, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 50%, var(--bg-color-3) 100%);
            color: var(--text-main);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Светящиеся красные сферы на фоне */
        .blob {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.45;
            animation: float 12s ease-in-out infinite alternate;
        }

        .blob-1 {
            top: -80px;
            left: -80px;
            background: radial-gradient(circle, rgba(227, 6, 19, 0.4) 0%, rgba(0,0,0,0) 70%);
        }

        .blob-2 {
            bottom: -80px;
            right: -80px;
            background: radial-gradient(circle, rgba(227, 6, 19, 0.25) 0%, rgba(0,0,0,0) 70%);
            animation-delay: -6s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.15); }
        }

        /* Премиальная карточка в авто-стиле */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            z-index: 2;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Фирменный логотип BUTIKAVTO */
        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 24px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-butik {
            color: #ffffff;
        }

        .logo-avto {
            color: var(--accent-red);
            text-shadow: 0 0 15px rgba(227, 6, 19, 0.3);
        }

        /* Иконка звонка с анимацией пульсации */
        .icon-container {
            width: 84px;
            height: 84px;
            margin: 0 auto 28px;
            background: radial-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.005) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .icon-container::before, .icon-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid var(--accent-red);
            opacity: 0.6;
            animation: pulse 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .icon-container::after {
            animation-delay: 1.25s;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .icon-container svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: var(--accent-red);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px var(--accent-red));
            animation: shake 3s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 90%, 100% { transform: rotate(0); }
            92% { transform: rotate(-10deg); }
            94% { transform: rotate(12deg); }
            96% { transform: rotate(-10deg); }
            98% { transform: rotate(8deg); }
        }

        /* Статус перенаправления */
        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .phone-number {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
            margin-bottom: 24px;
            display: inline-block;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 4px;
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* Кнопка вызова */
        .call-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--accent-red) 0%, #a30009 100%);
            border: none;
            border-radius: 16px;
            color: #ffffff;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 0 20px var(--glow-color);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .call-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: linear-gradient(135deg, var(--accent-red-hover) 0%, var(--accent-red) 100%);
            box-shadow: 0 8px 25px rgba(227, 6, 19, 0.6);
        }

        .call-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .call-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Анимация точек загрузки */
        .dots::after {
            content: '';
            animation: dotty 1.5s infinite steps(4);
        }

        @keyframes dotty {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>

    <!-- Фоновые эффекты размытия -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Карточка перенаправления -->
    <div class="card" id="card">
        <!-- Логотип BUTIKAVTO -->
        <div class="brand-logo">
            <span class="logo-butik">BUTIK</span><span class="logo-avto">AVTO</span>
        </div>

        <div class="icon-container">
            <!-- SVG Иконка телефона -->
            <svg viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        </div>
        
        <h1>Вызов<span class="dots"></span></h1>
        <div class="phone-number">+375 (29) 641-91-48</div>
        
        <p class="description">
            Мы соединяем вас с BUTIKAVTO [Борисов]. Если вызов не начался автоматически, пожалуйста, нажмите на кнопку ниже.
        </p>

        <!-- Кнопка вызова -->
        <a href="tel:+375296419148" class="call-btn" id="callLink">
            <svg viewBox="0 0 24 24">
                <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-2.2 2.2a15.045 15.045 0 0 1-6.59-6.59l2.2-2.21a.96.96 0 0 0 .25-1A11.36 11.36 0 0 1 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"></path>
            </svg>
            Позвонить
        </a>
    </div>

    <script>
        // Функция вызова
        function triggerCall() {
            window.location.href = "tel:+375296419148";
        }

        // 1. Попытка немедленного вызова при инициализации скрипта
        triggerCall();

        // 2. Попытка вызова после полной загрузки документа
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(triggerCall, 150);
        });

        // 3. Обработка клика по карточке
        document.getElementById('card').addEventListener('click', (e) => {
            if (!e.target.closest('#callLink')) {
                triggerCall();
            }
        });
    </script>
</body>
</html>
